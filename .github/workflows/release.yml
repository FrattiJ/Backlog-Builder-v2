# Builds and publishes a signed Windows release whenever a version tag is pushed.
# Usage: bump "version" in src-tauri/tauri.conf.json, commit, then:
#   git tag v0.2.0 && git push origin v0.2.0
# Requires the TAURI_SIGNING_PRIVATE_KEY repository secret (contents of ~/.tauri/hobbylog.key).

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    # Pinned: windows-latest (2025 image) has a stale MSVC BuildTools registration
    # that breaks rustc's linker discovery (link.exe not found)
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      # Point the build at the runner's actual MSVC install; rustc's auto-detection
      # can resolve to a stale link.exe path after runner image updates
      - uses: ilammy/msvc-dev-cmd@v1

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # npm install, not npm ci: npm versions disagree about the lockfile's bundled
      # wasm optional deps (@emnapi/*, npm/cli bug), so ci's strict sync check fails
      # depending on the runner's npm version. install honors the lock without the check.
      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Hobbylog ${{ github.ref_name }}'
          releaseBody: 'Download the .exe installer below to install. Existing installs update automatically.'
          releaseDraft: false
          prerelease: false
