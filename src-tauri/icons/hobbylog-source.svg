<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Outer square background -->
  <rect width="400" height="400" fill="#06070d"/>

  <!-- Clipped polygon panel (MechCard shape) -->
  <polygon points="52,0 400,0 400,348 348,400 0,400 0,52" fill="#0d1117"/>

  <!-- Blueprint grid -->
  <line x1="0"   y1="40"  x2="400" y2="40"  stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="80"  x2="400" y2="80"  stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="120" x2="400" y2="120" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="160" x2="400" y2="160" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="200" x2="400" y2="200" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="240" x2="400" y2="240" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="280" x2="400" y2="280" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="320" x2="400" y2="320" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0"   y1="360" x2="400" y2="360" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="40"  y1="0" x2="40"  y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="80"  y1="0" x2="80"  y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="120" y1="0" x2="120" y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="160" y1="0" x2="160" y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="240" y1="0" x2="240" y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="280" y1="0" x2="280" y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="320" y1="0" x2="320" y2="400" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="400" stroke="#1a2a3a" stroke-width="0.5"/>

  <!-- Polygon border -->
  <polygon points="52,0 400,0 400,348 348,400 0,400 0,52" fill="none" stroke="#7c3aed" stroke-width="2"/>

  <!-- Top-left accent triangle -->
  <polygon points="0,0 52,0 0,52" fill="#7c3aed"/>

  <!-- Bottom-right accent -->
  <polygon points="400,400 348,400 400,348" fill="#0891b2" opacity="0.4"/>

  <!-- H left bar: white -->
  <rect x="54"  y="72"  width="80" height="272" fill="#e2e8f0"/>
  <rect x="54"  y="72"  width="11" height="272" fill="#ffffff"/>
  <rect x="54"  y="72"  width="80" height="6"   fill="#ffffff"/>

  <!-- H crossbar: white -->
  <rect x="54"  y="200" width="218" height="38" fill="#e2e8f0"/>
  <rect x="54"  y="200" width="218" height="5"  fill="#ffffff"/>

  <!-- Progress bar 1 (short) -->
  <rect x="148" y="302" width="62" height="42" fill="#7c3aed"/>
  <rect x="148" y="302" width="62" height="6"  fill="#a78bfa"/>

  <!-- Progress bar 2 (medium) -->
  <rect x="220" y="200" width="62" height="144" fill="#7c3aed"/>
  <rect x="220" y="200" width="62" height="6"   fill="#a78bfa"/>

  <!-- Progress bar 3 (full) -->
  <rect x="292" y="72"  width="68" height="272" fill="#7c3aed"/>
  <rect x="292" y="72"  width="68" height="6"   fill="#a78bfa"/>

  <!-- HUD corner brackets -->
  <polyline points="56,74 56,60 70,60"    fill="none" stroke="#0891b2" stroke-width="1.5"/>
  <polyline points="350,60 362,60 362,74" fill="none" stroke="#0891b2" stroke-width="1.5"/>

  <!-- Status row -->
  <circle cx="68"  cy="378" r="4" fill="#22c55e"/>
  <line   x1="78"  y1="378" x2="140" y2="378" stroke="#1a2a3a" stroke-width="1"/>
  <rect   x="148" y="374" width="6" height="8" fill="#7c3aed" opacity="0.4"/>
  <rect   x="158" y="374" width="6" height="8" fill="#7c3aed" opacity="0.27"/>
  <rect   x="168" y="374" width="6" height="8" fill="#7c3aed" opacity="0.13"/>
</svg>
